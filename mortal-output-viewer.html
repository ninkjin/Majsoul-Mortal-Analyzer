<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mortal 复盘面板</title>
  <style>
    :root {
      --bg: #20252a;
      --felt: #2d6c58;
      --felt-dark: #1f4b3f;
      --panel: #f7f6ef;
      --panel-2: #ece9dc;
      --ink: #1d2428;
      --muted: #697075;
      --line: #d5d0bd;
      --blue: #2b6f9e;
      --green: #25805f;
      --red: #b24a42;
      --gold: #b8792b;
      --tile: #fffdf4;
      --tile-red: #c7463f;
      --tile-width: 27px;
      --tile-height: 36px;
      --tile-mini-width: 20px;
      --tile-mini-height: 27px;
      --tile-gap: 1px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, select, input {
      font: inherit;
    }

    .toolbar {
      height: 46px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #11161b;
      color: #f4f1e5;
      border-bottom: 1px solid #343b42;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .tool-btn, .tool-select {
      height: 32px;
      border: 1px solid #545e66;
      color: #f4f1e5;
      background: #242b31;
      border-radius: 4px;
      padding: 0 10px;
      cursor: pointer;
    }

    .tool-btn:hover {
      background: #303941;
    }

    .tool-select {
      min-width: 120px;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .status {
      color: #c9c6b8;
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(620px, 1fr) 390px;
      gap: 10px;
      padding: 10px;
      min-height: calc(100vh - 46px);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      min-width: 0;
    }

    .panel-head {
      min-height: 39px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
    }

    .panel-body {
      padding: 10px;
    }

    .side-scroll {
      max-height: calc(100vh - 104px);
      overflow: auto;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      min-height: 58px;
      background: #fffdf7;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 8px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
    }

    .metric-value {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .round-list, .choice-list {
      display: grid;
      gap: 5px;
    }

    .round-btn, .choice-btn {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf7;
      border-radius: 5px;
      min-height: 38px;
      padding: 7px 8px;
      display: grid;
      gap: 2px;
      text-align: left;
      cursor: pointer;
    }

    .round-btn.active, .choice-btn.active {
      border-color: var(--blue);
      background: #eef6fb;
    }

    .choice-btn.diff {
      border-left: 4px solid var(--gold);
    }

    .choice-main {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      min-width: 0;
    }

    .choice-sub, .round-sub {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 22px;
      min-width: 54px;
      padding: 0 8px;
      color: #fff;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .dahai { background: var(--blue); }
    .none { background: #636b6f; }
    .pon, .chi { background: var(--gold); }
    .hora, .reach { background: var(--green); }

    .review-main {
      display: grid;
      grid-template-rows: auto minmax(520px, 1fr) auto;
      gap: 10px;
      min-width: 0;
    }

    .info-strip {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .round-title {
      font-size: 15px;
      font-weight: 800;
    }

    .names {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .scoreline {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .table {
      position: relative;
      min-height: 560px;
      border-radius: 10px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 38%),
        linear-gradient(145deg, var(--felt), var(--felt-dark));
      border: 1px solid #15372e;
      overflow: hidden;
    }

    .center-box {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 172px;
      min-height: 118px;
      border-radius: 6px;
      background: rgba(16, 28, 27, .74);
      color: #f3f0df;
      border: 1px solid rgba(255,255,255,.16);
      padding: 10px;
      text-align: center;
    }

    .center-round {
      font-weight: 800;
      font-size: 18px;
    }

    .center-extra {
      margin-top: 6px;
      color: #d8d3bd;
      font-size: 12px;
      line-height: 1.45;
    }

    .settlement-box {
      position: absolute;
      right: 240px;
      top: 18px;
      width: 190px;
      padding: 10px;
      border: 1px solid rgba(244,241,229,.72);
      background: rgba(6, 84, 95, .94);
      color: #f4f1e5;
      font-size: 15px;
      line-height: 1.55;
      box-shadow: 0 8px 22px rgba(0,0,0,.28);
      z-index: 8;
      cursor: move;
      user-select: none;
      touch-action: none;
    }

    .settlement-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .settlement-table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
      font-size: 14px;
    }

    .settlement-table td {
      border: 1px solid rgba(244,241,229,.72);
      padding: 5px 7px;
    }

    .settlement-table td:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .seat {
      position: absolute;
      width: max-content;
      max-width: calc(100% - 36px);
      min-height: 126px;
      color: #f7f5e8;
    }

    .seat-bottom { left: 50%; bottom: 18px; transform: translateX(-50%); }
    .seat-right { right: 18px; top: 50%; transform: translateY(-50%); }
    .seat-top { left: 50%; top: 18px; transform: translateX(-50%); }
    .seat-left { left: 18px; top: 50%; transform: translateY(-50%); }

    .seat-top .seat-head,
    .seat-top .tiles {
      justify-content: center;
    }

    .seat-bottom .seat-head,
    .seat-bottom .tiles {
      justify-content: center;
    }

    .seat-right .seat-head,
    .seat-right .tiles {
      justify-content: flex-end;
    }

    .seat-left .hand,
    .seat-left .draw-tile,
    .seat-left .melds,
    .seat-right .hand,
    .seat-right .draw-tile,
    .seat-right .melds {
      flex-direction: column;
      align-items: center;
      max-height: 500px;
    }

    .seat-left .draw-tile,
    .seat-right .draw-tile {
      padding-left: 0;
      margin-top: 0;
      margin-bottom: 4px;
    }

    .seat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 26px;
      width: max-content;
      max-width: 260px;
      padding: 3px 7px;
      background: rgba(16, 28, 27, .72);
      border-radius: 4px;
      color: #f7f5e8;
      z-index: 4;
    }

    .seat-top .seat-head,
    .seat-bottom .seat-head {
      margin: 0 auto;
    }

    .seat-left .seat-head,
    .seat-right .seat-head {
      position: absolute;
      top: 2px;
      min-width: 170px;
    }

    .seat-left .seat-head {
      left: calc(var(--tile-height) + 14px);
    }

    .seat-right .seat-head {
      right: calc(var(--tile-height) + 14px);
    }

    .seat-name {
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seat-score {
      font-size: 12px;
      color: #d8d3bd;
    }

    .wind-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      margin-right: 4px;
      border-radius: 3px;
      color: #14322b;
      background: #f7f1d7;
      font-size: 12px;
      font-weight: 900;
    }

    .tiles {
      display: flex;
      flex-wrap: nowrap;
      gap: var(--tile-gap);
      align-items: center;
    }

    .hand {
      min-height: 32px;
      margin-top: 5px;
      overflow: visible;
    }

    .hand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--tile-gap);
    }

    .seat-left .hand-row,
    .seat-right .hand-row {
      flex-direction: column;
      gap: 14px;
    }

    .draw-tile {
      min-height: 34px;
      margin-top: 5px;
      padding-left: 16px;
      flex: 0 0 auto;
    }

    .seat-left .draw-tile,
    .seat-right .draw-tile {
      margin-top: 0;
      padding-left: 0;
      min-width: var(--tile-height);
      min-height: var(--tile-width);
    }

    .discard {
      position: absolute;
      display: flex;
      gap: 2px;
      opacity: .94;
    }

    .discard-bottom {
      left: 50%;
      top: 60%;
      transform: translateX(-50%);
      flex-direction: column;
      align-items: flex-start;
    }

    .discard-top {
      left: 50%;
      bottom: 60%;
      transform: translateX(-50%);
      flex-direction: column-reverse;
      align-items: flex-start;
    }

    .discard-right {
      left: 60%;
      top: 50%;
      transform: translateY(-50%);
      flex-direction: row;
      align-items: flex-start;
    }

    .discard-left {
      right: 60%;
      top: 50%;
      transform: translateY(-50%);
      flex-direction: row-reverse;
      align-items: flex-start;
    }

    .discard-row {
      display: flex;
      flex-wrap: nowrap;
      gap: var(--tile-gap);
    }

    .discard-left .discard-row {
      flex-direction: column;
    }

    .discard-right .discard-row {
      flex-direction: column;
      height: calc(6 * (var(--tile-width) + var(--tile-gap)));
      justify-content: flex-end;
    }

    .discard-top .discard-row {
      flex-direction: row;
      width: calc(6 * var(--tile-width) + 5 * (var(--tile-gap) - 9px));
      justify-content: flex-end;
    }

    .melds {
      min-height: 25px;
      margin-top: 6px;
    }

    .tile {
      width: var(--tile-width);
      height: var(--tile-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      box-shadow: 0 1px 0 rgba(0,0,0,.24);
      overflow: visible;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .tile.mini {
      width: var(--tile-mini-width);
      height: var(--tile-mini-height);
      margin: 2px 1px 0 1px;
      vertical-align: middle;
    }

    .tile.side {
      width: var(--tile-height);
      height: var(--tile-width);
    }

    .tile.discarded {
      opacity: .88;
    }

    .tile.riichi-discard {
      z-index: 2;
    }

    .discard-bottom .tile.riichi-discard,
    .discard-top .tile.riichi-discard {
      width: var(--tile-height);
      height: var(--tile-width);
      margin-top: calc((var(--tile-height) - var(--tile-width)) / 2);
      margin-bottom: calc((var(--tile-height) - var(--tile-width)) / 2);
    }

    .tile.called-chi {
      box-shadow: 0 0 0 3px rgba(45, 139, 214, .95), 0 1px 0 rgba(0,0,0,.24);
      z-index: 3;
    }

    .tile.called-pon {
      box-shadow: 0 0 0 3px rgba(226, 93, 69, .95), 0 1px 0 rgba(0,0,0,.24);
      z-index: 3;
    }

    .tile.called-kan {
      box-shadow: 0 0 0 3px rgba(139, 88, 210, .95), 0 1px 0 rgba(0,0,0,.24);
      z-index: 3;
    }

    .seat-bottom .hand .tile:not(:first-child),
    .seat-top .hand .tile:not(:first-child),
    .discard-bottom .discard-row .tile:not(:first-child),
    .discard-top .discard-row .tile:not(:first-child) {
      /* 修改麻将牌之间间距 */
      margin-left: -9px;
    }

    .seat-bottom .draw-tile .tile,
    .seat-top .draw-tile .tile {
      margin-left: 0;
    }

    .seat-left .hand .tile.drawn-side,
    .seat-right .hand .tile.drawn-side {
      margin-top: 14px;
    }

    .tile.ai-recommended {
      outline: 3px solid #30b866;
      outline-offset: 1px;
    }

    .tile.actual-discard {
      outline: 3px solid #d84545;
      outline-offset: 1px;
    }

    .meld {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      background: rgba(255,255,255,.12);
      border-radius: 5px;
    }

    .event-log {
      height: 120px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      padding: 8px;
      font-size: 12px;
      line-height: 1.5;
    }

    .log-line {
      color: #3f474b;
      white-space: nowrap;
    }

    .log-line.current {
      color: var(--blue);
      font-weight: 800;
    }

    .compare {
      display: grid;
      gap: 8px;
    }

    .compare-row {
      border: 1px solid var(--line);
      background: #fffdf7;
      border-radius: 5px;
      padding: 9px;
    }

    .compare-label {
      color: var(--muted);
      font-size: 11px;
    }

    .compare-value {
      margin-top: 3px;
      font-size: 18px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .q-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .q-row {
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .q-track {
      height: 10px;
      border-radius: 99px;
      background: #dfdac9;
      overflow: hidden;
      border: 1px solid #c9c1aa;
    }

    .q-fill {
      height: 100%;
      min-width: 0;
      background: linear-gradient(90deg, #2b6f9e, #47a6d8);
      border-radius: 99px;
      display: block;
    }

    .q-fill.best {
      background: linear-gradient(90deg, #25805f, #41c48d);
    }

    pre {
      max-height: 230px;
      overflow: auto;
      margin: 10px 0 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fffdf7;
      font-size: 11px;
      line-height: 1.45;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--red);
      font-weight: 800;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 250px minmax(520px, 1fr);
      }
      .right {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .toolbar {
        height: auto;
        flex-wrap: wrap;
      }
      .layout {
        grid-template-columns: 1fr;
      }
      .review-main {
        grid-template-rows: auto 520px auto;
      }
      .seat {
        width: 46%;
      }
      .tile {
        width: var(--tile-width);
        height: var(--tile-height);
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="tool-btn" id="prevRound">&lt; 上一局</button>
    <button class="tool-btn" id="nextRound">下一局 &gt;</button>
    <button class="tool-btn" id="prevDiff">&lt; 上一处差异</button>
    <button class="tool-btn" id="nextDiff">下一处差异 &gt;</button>
    <button class="tool-btn" id="prevChoice">&lt; 上一切牌</button>
    <button class="tool-btn" id="nextChoice">下一切牌 &gt;</button>
    <button class="tool-btn" id="prevEvent">&lt; 后退</button>
    <button class="tool-btn" id="nextEvent">前进 &gt;</button>
    <button class="tool-btn" id="aiMatchRate">单局AI吻合率</button>
    <button class="tool-btn" id="wholeMatchRate">整场AI吻合率</button>
    <select class="tool-select" id="roundSelect"></select>
    <div class="toolbar-spacer"></div>
    <div class="status" id="status">加载中</div>
  </div>

  <div class="layout">
    <aside class="panel side-scroll">
      <div class="panel-head">
        <span>复盘</span>
        <span id="choiceCount" class="muted">0 个选择</span>
      </div>
      <div class="panel-body">
        <div class="summary-grid">
          <div class="metric">
            <div class="metric-label">节点</div>
            <div class="metric-value" id="mChoices">0</div>
          </div>
          <div class="metric">
            <div class="metric-label">差异</div>
            <div class="metric-value" id="mDiffs">0</div>
          </div>
          <div class="metric">
            <div class="metric-label">和了</div>
            <div class="metric-value" id="mHora">0</div>
          </div>
          <div class="metric">
            <div class="metric-label">最低向听</div>
            <div class="metric-value" id="mShanten">-</div>
          </div>
        </div>
        <div class="round-list" id="roundList"></div>
      </div>
    </aside>

    <main class="review-main">
      <div class="info-strip">
        <div>
          <div class="round-title" id="roundTitle">-</div>
          <div class="names" id="names">-</div>
        </div>
        <div class="scoreline" id="scoreline">-</div>
      </div>

      <section class="table" id="table"></section>

      <section class="event-log" id="eventLog"></section>
    </main>

    <aside class="panel right side-scroll">
      <div class="panel-head">
        <span>当前选择</span>
        <span id="choiceIndex" class="muted">-</span>
      </div>
      <div class="panel-body">
        <div class="compare" id="choiceDetail"></div>
      </div>
    </aside>
  </div>

  <script>
    let PLAYER_ID = 2;
    const state = {
      events: [],
      outputs: [],
      rounds: [],
      choices: [],
      currentChoice: 0,
      currentEventIndex: null,
      names: [],
      tenhouRounds: [],
    };

    const $ = id => document.getElementById(id);

    function setMahjongTileSize(width, height = Math.round(width * 4 / 3)) {
      const root = document.documentElement;
      const tileWidth = Math.max(12, Number(width) || 27);
      const tileHeight = Math.max(16, Number(height) || Math.round(tileWidth * 4 / 3));
      root.style.setProperty('--tile-width', `${tileWidth}px`);
      root.style.setProperty('--tile-height', `${tileHeight}px`);
      root.style.setProperty('--tile-mini-width', `${Math.round(tileWidth * .74)}px`);
      root.style.setProperty('--tile-mini-height', `${Math.round(tileHeight * .75)}px`);
    }

    window.setMahjongTileSize = setMahjongTileSize;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function parseJsonl(text) {
      return text.replace(/^\uFEFF/, '').split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => JSON.parse(line));
    }

    function parseTenhouRounds(data) {
      const rounds = Array.isArray(data?.log) ? data.log : [];
      return rounds.map(round => {
        const result = round.find(item => Array.isArray(item) && typeof item[0] === 'string');
        if (!result) return null;
        const detail = Array.isArray(result[2]) ? result[2] : [];
        return {
          type: result[0],
          deltas: Array.isArray(result[1]) ? result[1] : [],
          winner: detail[0],
          target: detail[1],
          payer: detail[2],
          pointText: detail[3] || '',
          yaku: detail.slice(4),
        };
      });
    }

    function translateYaku(text) {
      const yakuNames = {
        'Half Flush': '混一色',
        'All Simples': '断幺九',
        'Riichi': '立直',
        'Dora': '宝牌',
        'Red Five': '红宝牌',
        'Ura Dora': '里宝牌',
        'Fully Concealed Hand': '门前清自摸和',
        'Pinfu': '平和',
        'Ippatsu': '一发',
        'Green Dragon': '役牌 发',
        'White Dragon': '役牌 白',
        'Red Dragon': '役牌 中',
        'Seat Wind': '自风',
        'Prevalent Wind': '场风',
      };
      const normalized = String(text || '')
        .replaceAll('飜', '番')
        .replaceAll('満貫', '满贯')
        .replaceAll('跳満', '跳满')
        .replaceAll('倍満', '倍满')
        .replaceAll('三倍満', '三倍满')
        .replaceAll('役満', '役满')
        .replaceAll('ドラ', '宝牌')
        .replaceAll('裏宝牌', '里宝牌')
        .replaceAll('赤宝牌', '红宝牌')
        .replaceAll('一発', '一发')
        .replaceAll('三色同順', '三色同顺')
        .replaceAll('門前清自摸和', '门前清自摸和')
        .replaceAll('自風', '自风')
        .replaceAll('場風', '场风')
        .replaceAll('東', '东')
        .replaceAll('發', '发');
      return normalized.replace(/^(.+?)\((\d+)番\)$/, (_, name, han) => `${yakuNames[name] || name}（${han}番）`);
    }

    function tileText(tile) {
      if (!tile) return '';
      const winds = { E: '东', S: '南', W: '西', N: '北', P: '白', F: '发', C: '中', '?': '?' };
      if (winds[tile]) return winds[tile];
      return tile.replace('r', '');
    }

    function tileImageUrl(tile, pose = 1) {
      if (!tile) return 'log-viewer/files/images/blank.png';
      if (tile === '?') return `log-viewer/files/images/p_bk_${pose}.gif`;

      const honors = {
        E: 'ji_e',
        S: 'ji_s',
        W: 'ji_w',
        N: 'ji_n',
        P: 'no',
        F: 'ji_h',
        C: 'ji_c',
      };
      if (honors[tile]) return `log-viewer/files/images/p_${honors[tile]}_${pose}.gif`;

      const match = String(tile).match(/^([1-9])([mps])(r)?$/);
      if (!match) return 'log-viewer/files/images/p_bk_1.gif';
      const [, number, suit, red] = match;
      // The bundled red-five assets only exist in two orientations:
      // _1 for upright tiles and _3 for sideways tiles. Map missing red
      // orientations to an existing image so the browser does not fall back
      // to the tile-back placeholder.
      const safePose = red ? (pose === 3 || pose === 4 ? 3 : 1) : pose;
      const extension = red ? 'png' : 'gif';
      return `log-viewer/files/images/p_${suit}s${number}${red ? 'r' : ''}_${safePose}.${extension}`;
    }

    function tileHtml(tile, extra = '', pose = 1, style = '') {
      const red = String(tile || '').includes('r');
      const back = tile === '?';
      const label = escapeHtml(tileText(tile));
      const src = tileImageUrl(tile, pose);
      return `<span class="tile ${red ? 'red' : ''} ${back ? 'back' : ''} ${extra}" title="${label}"${style ? ` style="${escapeHtml(style)}"` : ''}>
        <img src="${src}" alt="${label}" onerror="this.onerror=null;this.src='log-viewer/files/images/p_bk_1.gif';">
      </span>`;
    }

    function actionText(action) {
      if (!action) return '-';
      if (action.type === 'dahai') return `打 ${tileText(action.pai)}${action.tsumogiri ? ' 摸切' : ''}`;
      if (action.type === 'none') return '跳过';
      if (action.type === 'reach') return '立直';
      if (action.type === 'hora') return `和了 ${typeof action.target === 'number' ? `目标 ${action.target}` : ''}`;
      if (action.type === 'pon') return `碰 ${tileText(action.pai)}`;
      if (action.type === 'chi') return `吃 ${tileText(action.pai)}`;
      return action.type;
    }

    function eventText(event) {
      if (!event) return '-';
      if (event.type === 'tsumo') return `摸 ${tileText(event.pai)}`;
      if (event.type === 'dahai') return `打 ${tileText(event.pai)}${event.tsumogiri ? ' 摸切' : ''}`;
      if (event.type === 'start_kyoku') return `${event.bakaze}${event.kyoku} 本场${event.honba}`;
      if (event.type === 'hora') return `和了`;
      if (event.type === 'ryukyoku') return '流局';
      if (event.type === 'reach') return `立直`;
      if (event.type === 'reach_accepted') return `立直成立`;
      if (event.type === 'pon') return `碰 ${tileText(event.pai)}`;
      if (event.type === 'chi') return `吃 ${tileText(event.pai)}`;
      if (event.type === 'dora') return `新宝牌 ${tileText(event.dora_marker)}`;
      return event.type;
    }

    function bestQ(output) {
      const q = output?.meta?.q_values || [];
      return q.length ? Math.max(...q) : null;
    }

    function hasAiMeta(output) {
      return Array.isArray(output?.meta?.q_values) && output.meta.q_values.length > 0;
    }

    function shouldShowAiChoice(output, eventIndex) {
      if (!hasAiMeta(output)) return false;
      if (isForcedRiichiTsumogiriChoice(output, eventIndex)) return false;
      if (isForcedRiichiPassChoice(output, eventIndex)) return false;
      return true;
    }

    function isForcedRiichiTsumogiriChoice(output, eventIndex) {
      if (output?.type !== 'dahai') return false;
      const event = state.events[eventIndex];
      if (event?.type !== 'tsumo' || event.actor !== PLAYER_ID) return false;
      if (!playerRiichiBeforeEvent(eventIndex)) return false;
      const maskIndexes = maskActionIndexes(output.meta?.mask_bits);
      return !maskIndexes.some(index => index === 42 || index === 43);
    }

    function isForcedRiichiPassChoice(output, eventIndex) {
      if (output?.type !== 'none') return false;
      const event = state.events[eventIndex];
      if (event?.type !== 'dahai' || event.actor === PLAYER_ID) return false;
      if (!playerRiichiBeforeEvent(eventIndex)) return false;
      const maskIndexes = maskActionIndexes(output.meta?.mask_bits);
      return !maskIndexes.includes(43);
    }

    function playerRiichiBeforeEvent(eventIndex) {
      const round = state.rounds.find(item => eventIndex >= item.start && eventIndex <= item.end);
      const start = round?.start ?? 0;
      for (let i = start + 1; i < eventIndex; i++) {
        const event = state.events[i];
        if (event.type === 'reach' && event.actor === PLAYER_ID) return true;
      }
      return false;
    }

    function sameAction(a, b) {
      if (!a || !b) return false;
      if (a.type !== b.type) return false;
      if ('pai' in a || 'pai' in b) return a.pai === b.pai;
      return true;
    }

    function buildRounds(events) {
      const rounds = [];
      for (let i = 0; i < events.length; i++) {
        if (events[i].type !== 'start_kyoku') continue;
        const end = events.findIndex((event, idx) => idx > i && event.type === 'end_kyoku');
        rounds.push({
          start: i,
          end: end === -1 ? events.length - 1 : end,
          info: events[i],
          number: rounds.length + 1,
        });
      }
      return rounds;
    }

    function findNextEventForOutput(output, fromIndex) {
      const events = state.events;
      const candidates = [];
      for (let i = fromIndex; i < events.length; i++) {
        const event = events[i];
        if (output.type === 'none') {
          if (event.type === 'dahai' && event.actor !== PLAYER_ID) candidates.push(i);
        } else if (output.type === 'dahai') {
          if (event.type === 'dahai' && event.actor === PLAYER_ID) {
            if (event.pai === output.pai) return i;
            candidates.push(i);
          }
        } else if (['pon', 'chi', 'reach', 'hora', 'ankan', 'kakan', 'daiminkan'].includes(output.type)) {
          if (event.type === output.type && event.actor === PLAYER_ID) {
            if (!output.pai || event.pai === output.pai) return i;
            candidates.push(i);
          }
        }
        if (candidates.length > 8) break;
      }
      return candidates[0] ?? fromIndex;
    }

    function findActualAfterReaction(reaction, eventIndex) {
      if (!reaction || reaction.type === 'none') return null;
      const currentRound = state.rounds.find(round => eventIndex >= round.start && eventIndex <= round.end);
      const end = currentRound?.end ?? state.events.length - 1;
      for (let i = eventIndex + 1; i <= end; i++) {
        const event = state.events[i];
        if (event.actor !== PLAYER_ID) continue;
        const isAction = ['dahai', 'pon', 'chi', 'reach', 'hora', 'ankan', 'kakan', 'daiminkan'].includes(event.type);
        if (!isAction) continue;
        if (sameAction(reaction, event)) return event;
        return event;
      }
      return null;
    }

    function buildChoices(outputs) {
      if (outputs[0]?.reaction) {
        return outputs.filter(row => shouldShowAiChoice(row.reaction, row.event_index)).map((row, index) => {
          const eventIndex = row.event_index;
          const output = row.reaction;
          const actual = findActualAfterReaction(output, eventIndex);
          const roundIndex = state.rounds.findIndex(round => eventIndex >= round.start && eventIndex <= round.end);
          return {
            index,
            output,
            trigger: row.event,
            actual,
            eventIndex,
            roundIndex: Math.max(0, roundIndex),
            diff: output.type !== 'none' && !sameAction(output, actual),
          };
        });
      }

      let cursor = 0;
      const choices = [];
      outputs.filter(hasAiMeta).forEach(output => {
        const eventIndex = findNextEventForOutput(output, cursor);
        cursor = Math.max(eventIndex + 1, cursor + 1);
        if (!shouldShowAiChoice(output, eventIndex)) return;
        const actual = findActualAfterReaction(output, eventIndex);
        const roundIndex = state.rounds.findIndex(round => eventIndex >= round.start && eventIndex <= round.end);
        choices.push({
          index: choices.length,
          output,
          trigger: state.events[eventIndex],
          actual,
          eventIndex,
          roundIndex: Math.max(0, roundIndex),
          diff: output.type !== 'none' && !sameAction(output, actual),
        });
      });
      return choices;
    }

    function initialBoard(round) {
      const info = round.info;
      return {
        round: info,
        scores: [...(info.scores || [0, 0, 0, 0])],
        hands: (info.tehais || [[], [], [], []]).map(hand => [...hand]),
        drawn: [null, null, null, null],
        discards: [[], [], [], []],
        melds: [[], [], [], []],
        riichi: [false, false, false, false],
        riichiPending: [false, false, false, false],
        dora: [info.dora_marker].filter(Boolean),
        kyotaku: info.kyotaku || 0,
        current: null,
      };
    }

    function removeTile(hand, tile) {
      const clean = String(tile || '').replace('r', '');
      let idx = hand.findIndex(item => item === tile);
      if (idx < 0) idx = hand.findIndex(item => String(item).replace('r', '') === clean);
      if (idx >= 0) hand.splice(idx, 1);
    }

    function applyEvent(board, event) {
      const actor = event.actor;
      if (event.type === 'tsumo') {
        board.drawn[actor] = event.pai;
        board.current = event;
      } else if (event.type === 'dahai') {
        if (normalize(board.drawn[actor]) === normalize(event.pai)) {
          board.drawn[actor] = null;
        } else {
          removeTile(board.hands[actor], event.pai);
          if (board.drawn[actor]) board.hands[actor].push(board.drawn[actor]);
          board.drawn[actor] = null;
        }
        board.discards[actor].push({
          tile: event.pai,
          riichi: board.riichiPending[actor],
        });
        board.riichiPending[actor] = false;
        board.current = event;
      } else if (event.type === 'pon' || event.type === 'chi' || event.type === 'daiminkan') {
        for (const tile of event.consumed || []) removeTile(board.hands[actor], tile);
        board.drawn[actor] = null;
        board.melds[actor].push([event.type, event.pai, ...(event.consumed || [])]);
        board.current = event;
      } else if (event.type === 'reach') {
        board.riichi[actor] = true;
        board.riichiPending[actor] = true;
        board.current = event;
      } else if (event.type === 'reach_accepted') {
        board.scores[actor] -= 1000;
        board.kyotaku += 1;
        board.current = event;
      } else if (event.type === 'dora') {
        board.dora.push(event.dora_marker);
      } else if (event.type === 'hora' || event.type === 'ryukyoku') {
        if (event.deltas) board.scores = board.scores.map((score, i) => score + event.deltas[i]);
        board.current = event;
      }
    }

    function boardAt(choice, eventIndex = choice.eventIndex) {
      const round = state.rounds[choice.roundIndex];
      const board = initialBoard(round);
      for (let i = round.start + 1; i <= eventIndex; i++) {
        applyEvent(board, state.events[i]);
      }
      return board;
    }

    function renderAll() {
      renderToolbar();
      renderRounds();
      renderChoice();
    }

    function renderToolbar() {
      const choices = state.choices;
      const diffs = choices.filter(choice => choice.diff);
      const shantens = choices.map(choice => choice.output.meta?.shanten).filter(Number.isFinite);
      $('status').textContent = `viewer-data/log.json + viewer-data/mortal-output-p2-mapped.jsonl`;
      $('choiceCount').textContent = `${choices.length} 个选择`;
      $('mChoices').textContent = choices.length;
      $('mDiffs').textContent = diffs.length;
      $('mHora').textContent = choices.filter(choice => choice.output.type === 'hora').length;
      $('mShanten').textContent = shantens.length ? Math.min(...shantens) : '-';
      $('roundSelect').innerHTML = state.rounds.map((round, idx) =>
        `<option value="${idx}">${roundName(round.info)}</option>`
      ).join('');
    }

    function renderRounds() {
      const current = state.choices[state.currentChoice];
      $('roundSelect').value = current?.roundIndex ?? 0;
      $('roundList').innerHTML = state.rounds.map((round, idx) => {
        const count = state.choices.filter(choice => choice.roundIndex === idx).length;
        return `<button class="round-btn ${idx === current?.roundIndex ? 'active' : ''}" data-round="${idx}">
          <strong>${escapeHtml(roundName(round.info))}</strong>
          <span class="round-sub">${count} 个选择 · 亲家 ${round.info.oya}</span>
        </button>`;
      }).join('');
    }

    function renderChoice() {
      const choice = state.choices[state.currentChoice];
      if (!choice) return;
      const round = state.rounds[choice.roundIndex];
      const eventIndex = state.currentEventIndex ?? choice.eventIndex;
      const board = boardAt(choice, eventIndex);
      $('roundTitle').textContent = `${roundName(round.info)} · 选择 #${choice.index + 1} · 事件 #${eventIndex}`;
      $('names').textContent = state.names.map((name, i) => `${i}: ${name}`).join(' / ');
      $('scoreline').textContent = board.scores.map((score, i) => `${i}: ${score}`).join('  ');
      $('choiceIndex').textContent = `#${choice.index + 1} / 事件 #${eventIndex}`;
      renderTable(board, choice, eventIndex);
      renderEventLog(choice, eventIndex);
      renderChoiceDetail(choice);
      renderChoiceList(choice);
      renderRounds();
    }

    function roundName(info) {
      const wind = { E: '东', S: '南', W: '西', N: '北' }[info.bakaze] || info.bakaze || '?';
      const honba = info.honba || 0;
      return `${wind}${info.kyoku || '?'}${honba ? `-${honba}` : ''}`;
    }

    function renderTable(board, choice, eventIndex) {
      const highlights = choiceTileHighlights(choice, choiceHighlightsEnabled(choice, eventIndex));
      $('table').innerHTML = `
        <div class="center-box">
          <div class="center-round">${escapeHtml(roundName(board.round))}</div>
          <div class="center-extra">
            宝牌 ${board.dora.map(tile => tileHtml(tile, 'mini')).join('')}<br>
            供托 ${board.kyotaku || 0}<br>
            本场 ${board.round.honba || 0}
          </div>
        </div>
        ${[0, 1, 2, 3].map(seat => seatHtml(seat, board, highlights)).join('')}
        ${[0, 1, 2, 3].map(seat => discardHtml(seat, board, choice)).join('')}
        ${settlementHtml(choice, board, eventIndex)}
      `;
    }

    function choiceHighlightsEnabled(choice, eventIndex) {
      return state.currentEventIndex === null || eventIndex === choice.eventIndex;
    }

    function choiceTileHighlights(choice, enabled) {
      if (!enabled || choice.output?.type !== 'dahai') return {};
      const recommended = choice.output.pai || null;
      const actual = choice.actual?.type === 'dahai' && choice.actual.actor === PLAYER_ID
        ? choice.actual.pai
        : null;
      const same = recommended && actual && normalize(actual) === normalize(recommended);
      return {
        recommended,
        actual: same ? null : actual,
      };
    }

    function seatPosition(seat) {
      const rel = (seat - PLAYER_ID + 4) % 4;
      return ['bottom', 'right', 'top', 'left'][rel];
    }

    function tilePoseForPosition(pos) {
      return { bottom: 1, right: 3, top: 2, left: 4 }[pos] || 1;
    }

    function riichiPoseForPosition(pos) {
      return { bottom: 3, right: 1, top: 4, left: 2 }[pos] || 3;
    }

    function seatWind(seat, round) {
      const rel = (seat - round.oya + 4) % 4;
      return ['东', '南', '西', '北'][rel] || '?';
    }

    function relativeSeatName(seat) {
      const rel = (seat - PLAYER_ID + 4) % 4;
      return ['自家', '下家', '对家', '上家'][rel] || `玩家${seat}`;
    }

    function seatHtml(seat, board, highlights) {
      const hand = sortTiles(board.hands[seat] || []);
      const melds = board.melds[seat] || [];
      const pos = seatPosition(seat);
      const side = pos === 'left' || pos === 'right';
      const tilePose = tilePoseForPosition(pos);
      const tileExtra = side ? 'side' : '';
      const highlightClass = tile => {
        if (seat !== PLAYER_ID) return '';
        if (highlights.actual && normalize(tile) === normalize(highlights.actual)) return 'actual-discard';
        if (highlights.recommended && normalize(tile) === normalize(highlights.recommended)) return 'ai-recommended';
        return '';
      };
      const handTiles = hand.map(tile =>
        tileHtml(tile, `${tileExtra} ${highlightClass(tile)}`, tilePose)
      ).join('');
      const drawnTile = board.drawn[seat]
        ? tileHtml(
            board.drawn[seat],
            `${tileExtra} ${side ? 'drawn-side' : ''} ${highlightClass(board.drawn[seat])}`,
            tilePose
          )
        : '';
      return `<section class="seat seat-${pos}">
        <div class="seat-head">
          <span class="seat-name">${seat === PLAYER_ID ? '★ ' : ''}<span class="wind-label">${seatWind(seat, board.round)}</span> ${escapeHtml(state.names[seat] || `玩家 ${seat}`)} ${board.riichi[seat] ? '立' : ''}</span>
          <span class="seat-score">${board.scores[seat] ?? '-'}</span>
        </div>
        <div class="hand-row">
          <div class="tiles hand">
            ${handTiles}${side ? drawnTile : ''}
          </div>
          ${side ? '' : `<div class="tiles draw-tile">${drawnTile}</div>`}
        </div>
        <div class="tiles melds">
          ${melds.map(meld => `<span class="meld">${meld.slice(1).map(tile => tileHtml(tile, tileExtra, tilePose)).join('')}</span>`).join('')}
        </div>
      </section>`;
    }

    function isCurrentCallTarget(choice, seat, index, discard, discards) {
      const output = choice.output || {};
      if (output.actor !== PLAYER_ID) return false;
      if (!['chi', 'pon', 'daiminkan'].includes(output.type)) return false;
      const target = typeof output.target === 'number' ? output.target : choice.trigger?.actor;
      if (seat !== target) return false;
      const tile = typeof discard === 'string' ? discard : discard.tile;
      const calledTile = output.pai || choice.trigger?.pai;
      if (normalize(tile) !== normalize(calledTile)) return false;
      for (let i = index + 1; i < discards.length; i++) {
        const nextTile = typeof discards[i] === 'string' ? discards[i] : discards[i].tile;
        if (normalize(nextTile) === normalize(calledTile)) return false;
      }
      return true;
    }

    function chunkDiscards(discards) {
      const rows = [];
      for (let i = 0; i < discards.length; i += 6) {
        rows.push(discards.slice(i, i + 6));
      }
      return rows;
    }

    function discardHtml(seat, board, choice) {
      const pos = seatPosition(seat);
      const side = pos === 'left' || pos === 'right';
      const discards = board.discards[seat] || [];
      const reverseRows = pos === 'top' || pos === 'right';
      return `<div class="tiles discard discard-${pos}">
        ${chunkDiscards(discards).map((row, rowIndex) => {
          const rowItems = row.map((discard, colIndex) => ({
            discard,
            index: rowIndex * 6 + colIndex,
          }));
          if (reverseRows) rowItems.reverse();
          return `<div class="discard-row">
          ${rowItems.map(({ discard, index }) => {
            const tile = typeof discard === 'string' ? discard : discard.tile;
            const riichi = typeof discard === 'object' && discard.riichi;
            const called = isCurrentCallTarget(choice, seat, index, discard, discards) ? choice.output.type : null;
            const calledClass = called === 'chi' ? 'called-chi' : called === 'pon' ? 'called-pon' : called === 'daiminkan' ? 'called-kan' : '';
            const pose = riichi ? riichiPoseForPosition(pos) : tilePoseForPosition(pos);
            const sideways = pose === 3 || pose === 4;
            return tileHtml(tile, `discarded ${sideways ? 'side' : ''} ${riichi ? 'riichi-discard' : ''} ${calledClass}`, pose);
          }).join('')}
        </div>`;
        }).join('')}
      </div>`;
    }

    function resultEventIndexForRound(roundIndex) {
      const round = state.rounds[roundIndex];
      if (!round) return null;
      const resultIndex = state.events.findIndex((event, index) =>
        index >= round.start &&
        index <= round.end &&
        (event.type === 'hora' || event.type === 'ryukyoku')
      );
      return resultIndex < 0 ? null : resultIndex;
    }

    function roundResultEvent(choice, eventIndex) {
      const resultIndex = resultEventIndexForRound(choice.roundIndex);
      if (resultIndex === null) return null;
      if (eventIndex < resultIndex) return null;
      return state.events[resultIndex];
    }

    function settlementTitle(event) {
      if (!event) return '';
      if (event.type === 'ryukyoku') return '流局';
      const winner = relativeSeatName(event.actor);
      if (event.actor === event.target) {
        const gain = Math.max(...(event.deltas || [0]));
        return `${winner} 自摸 ${gain}点`;
      }
      return `${winner} 荣和 ${relativeSeatName(event.target)} ${event.deltas?.[event.actor] || 0}点`;
    }

    function tenhouResultForChoice(choice) {
      return state.tenhouRounds[choice.roundIndex] || null;
    }

    function settlementHtml(choice, board, eventIndex) {
      const event = roundResultEvent(choice, eventIndex);
      if (!event?.deltas) return '';
      const tenhou = tenhouResultForChoice(choice);
      const title = tenhou?.pointText
        ? `${settlementTitle(event)} · ${translateYaku(tenhou.pointText)}`
        : settlementTitle(event);
      const order = [
        (PLAYER_ID + 2) % 4,
        (PLAYER_ID + 3) % 4,
        PLAYER_ID,
        (PLAYER_ID + 1) % 4,
      ];
      return `<aside class="settlement-box" data-draggable-settlement="true">
        <div class="settlement-title">${escapeHtml(title)}</div>
        ${tenhou?.yaku?.length ? `<div>${tenhou.yaku.map(translateYaku).map(escapeHtml).join('<br>')}</div>` : ''}
        <table class="settlement-table">
          <tbody>
            ${order.map(seat => `<tr>
              <td>${relativeSeatName(seat)}</td>
              <td>${event.deltas[seat] || 0}</td>
            </tr>`).join('')}
            <tr>
              <td>场供</td>
              <td>${board?.kyotaku || choice.trigger?.kyotaku || 0}</td>
            </tr>
          </tbody>
        </table>
      </aside>`;
    }

    function normalize(tile) {
      return String(tile || '').replace('r', '');
    }

    function tileSortValue(tile) {
      const clean = normalize(tile);
      const suited = clean.match(/^([1-9])([mps])$/);
      if (suited) {
        const suitOrder = { m: 0, p: 1, s: 2 };
        const redOffset = String(tile || '').includes('r') ? .1 : 0;
        return suitOrder[suited[2]] * 10 + Number(suited[1]) + redOffset;
      }
      const honors = { E: 31, S: 32, W: 33, N: 34, P: 35, F: 36, C: 37, '?': 99 };
      return honors[clean] ?? 98;
    }

    function sortTiles(tiles) {
      return [...tiles].sort((a, b) => tileSortValue(a) - tileSortValue(b));
    }

    function actionIndexToTile(index) {
      if (index >= 0 && index <= 8) return `${index + 1}m`;
      if (index >= 9 && index <= 17) return `${index - 8}p`;
      if (index >= 18 && index <= 26) return `${index - 17}s`;
      if (index >= 27 && index <= 33) return ['E', 'S', 'W', 'N', 'P', 'F', 'C'][index - 27];
      return { 34: '5mr', 35: '5pr', 36: '5sr' }[index] || null;
    }

    function isDiscardActionIndex(index) {
      return index >= 0 && index <= 36;
    }

    function actionIndexLabel(index) {
      const tile = actionIndexToTile(index);
      if (tile) return tileText(tile);
      const labels = {
        37: '立直',
        38: '吃-低目',
        39: '吃-中张',
        40: '吃-高目',
        41: '碰',
        42: '杠',
        43: '和了',
        44: '流局',
        45: '跳过',
      };
      return labels[index] || `动作 ${index}`;
    }

    function maskActionIndexes(maskBits) {
      if (!Number.isFinite(maskBits)) return [];
      let mask = BigInt(maskBits);
      const indexes = [];
      for (let index = 0; mask > 0n; index++) {
        if (mask & 1n) indexes.push(index);
        mask >>= 1n;
      }
      return indexes;
    }

    function renderEventLog(choice, eventIndex = choice.eventIndex) {
      const start = Math.max(0, eventIndex - 12);
      const end = Math.min(state.events.length - 1, eventIndex + 8);
      $('eventLog').innerHTML = Array.from({ length: end - start + 1 }, (_, offset) => {
        const idx = start + offset;
        return `<div class="log-line ${idx === eventIndex ? 'current' : ''}">
          #${idx} ${escapeHtml(eventText(state.events[idx]))}
        </div>`;
      }).join('');
    }

    function qProbabilities(values) {
      if (!values.length) return [];
      const max = Math.max(...values);
      const exps = values.map(value => Math.exp(value - max));
      const sum = exps.reduce((acc, value) => acc + value, 0);
      return exps.map(value => sum ? value / sum : 0);
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(value >= .1 ? 1 : 2)}%`;
    }

    function renderChoiceDetail(choice) {
      const output = choice.output;
      const q = output.meta?.q_values || [];
      const qLabels = qValueLabels(choice, q.length);
      const qProbs = qProbabilities(q);
      const best = bestQ(output);
      const bestProb = best === null ? null : qProbs[q.indexOf(best)];
      $('choiceDetail').innerHTML = `
        <div class="compare-row">
          <div class="compare-label">Mortal 推荐</div>
          <div class="compare-value"><span class="badge ${output.type}">${escapeHtml(output.type)}</span> ${escapeHtml(actionText(output))}</div>
        </div>
        <div class="compare-row">
          <div class="compare-label">触发事件</div>
          <div class="compare-value">${escapeHtml(eventText(choice.trigger))}</div>
        </div>
        <div class="compare-row">
          <div class="compare-label">牌谱实际动作</div>
          <div class="compare-value">${escapeHtml(choice.actual ? eventText(choice.actual) : '跳过')}</div>
        </div>
        <div class="compare-row">
          <div class="compare-label">状态</div>
          <div class="compare-value">${choice.diff ? '<span class="error">与实际动作不同</span>' : '匹配 '}</div>
        </div>
        <div class="compare-row">
          <div class="compare-label">向听 / 最高 P / 耗时</div>
          <div class="compare-value">${output.meta?.shanten ?? '-'} · ${bestProb === null ? '-' : formatPercent(bestProb)} · ${formatMs(output.meta?.eval_time_ns)}</div>
        </div>
        <div class="q-list">
          ${q.map((value, idx) => ({ value, idx, prob: qProbs[idx] || 0, label: qLabels[idx] ?? '未知' }))
            .filter(item => item.label !== '未知')
            .sort((a, b) => b.value - a.value)
            .map(item => `<div class="q-row">
            <span class="muted">${escapeHtml(item.label)}</span>
            <span class="q-track" title="Q=${item.value.toFixed(4)}"><span class="q-fill ${item.value === best ? 'best' : ''}" style="width:${Math.max(3, item.prob * 100)}%"></span></span>
            <span class="muted">${formatPercent(item.prob)}</span>
          </div>`).join('')}
        </div>
        <pre>${escapeHtml(JSON.stringify(output, null, 2))}</pre>
      `;
    }

    function qValueLabels(choice, count) {
      const output = choice.output;
      if (!count) return [];

      const maskLabels = maskActionIndexes(output.meta?.mask_bits).map(actionIndexLabel);
      const maskIndexes = maskActionIndexes(output.meta?.mask_bits);
      const postRiichiLabels = postRiichiQValueLabels(choice, count, maskIndexes);
      if (postRiichiLabels) return postRiichiLabels;
      if (maskIndexes.length === count && maskIndexes.includes(37)) {
        return maskIndexes.map(index => {
          const tile = actionIndexToTile(index);
          if (isDiscardActionIndex(index) && tile) return `不立直 打 ${tileText(tile)}`;
          return actionIndexLabel(index);
        });
      }
      if (maskLabels.length === count) return maskLabels;

      if (output.type === 'dahai') {
        const board = boardAt(choice);
        const tiles = sortTiles(board.hands[PLAYER_ID] || []);
        if (board.drawn[PLAYER_ID]) tiles.push(board.drawn[PLAYER_ID]);
        const labels = tiles.map(tileText);
        if (labels.length >= count) return labels.slice(0, count);
        return [...labels, ...Array.from({ length: count - labels.length }, () => '未知')];
      }

      if (output.type === 'none') {
        if (count === 2) return ['执行', '跳过'];
        if (count === 3) return ['吃/碰', '和了', '跳过'];
        return Array.from({ length: count }, () => '未知');
      }

      if (output.type === 'pon') return count === 2 ? ['碰', '跳过'] : Array.from({ length: count }, () => '未知');
      if (output.type === 'chi') return count === 2 ? ['吃', '跳过'] : Array.from({ length: count }, () => '未知');
      if (output.type === 'hora') return count === 2 ? ['和了', '跳过'] : Array.from({ length: count }, () => '未知');
      if (output.type === 'reach') {
        const base = qValueLabels({ ...choice, output: { ...output, type: 'dahai' } }, count);
        return base.map((label, idx) => idx === count - 1 ? `立直 ${label}` : label);
      }

      return Array.from({ length: count }, () => '未知');
    }

    function postRiichiQValueLabels(choice, count, maskIndexes) {
      if (!playerRiichiBeforeEvent(choice.eventIndex)) return null;
      const output = choice.output;
      if (!['hora', 'none', 'kakan', 'ankan', 'daiminkan'].includes(output.type) && !maskIndexes.includes(43)) return null;
      if (maskIndexes.length !== count) return null;
      return maskIndexes.map(index => {
        if (index === 43) return '和了';
        if (index === 42) return '杠';
        if (index === 37 || index === 45) return '不和';
        const tile = actionIndexToTile(index);
        if (isDiscardActionIndex(index) && tile) return `不和 打 ${tileText(tile)}`;
        return '未知';
      });
    }

    function renderChoiceList(current) {
      const currentRound = current.roundIndex;
      const items = state.choices
        .filter(choice => choice.roundIndex === currentRound)
        .map(choice => `<button class="choice-btn ${choice.index === current.index ? 'active' : ''} ${choice.diff ? 'diff' : ''}" data-choice="${choice.index}">
          <span class="choice-main">
            <span>#${choice.index + 1} ${escapeHtml(actionText(choice.output))}</span>
            <span class="badge ${choice.output.type}">${escapeHtml(choice.output.type)}</span>
          </span>
          <span class="choice-sub">${escapeHtml(eventText(choice.trigger))} · 向听 ${choice.output.meta?.shanten ?? '-'}</span>
        </button>`)
        .join('');
      $('choiceDetail').insertAdjacentHTML('beforeend', `
        <div class="panel-head" style="margin:12px -10px 0;border-top:1px solid var(--line);">本局节点</div>
        <div class="choice-list" style="margin-top:10px">${items}</div>
      `);
    }

    function formatMs(ns) {
      if (!Number.isFinite(ns)) return '-';
      return `${(ns / 1e6).toFixed(ns > 1e7 ? 1 : 2)} ms`;
    }

    function goChoice(delta) {
      const current = state.choices[state.currentChoice];
      if (delta > 0 && state.currentEventIndex !== null && current && state.currentEventIndex < current.eventIndex) {
        state.currentEventIndex = null;
        renderChoice();
        return;
      }
      const next = Math.max(0, Math.min(state.choices.length - 1, state.currentChoice + delta));
      if (delta > 0 && current) {
        const resultIndex = resultEventIndexForRound(current.roundIndex);
        const currentEvent = state.currentEventIndex ?? current.eventIndex;
        const nextChoice = state.choices[next];
        if (
          resultIndex !== null &&
          currentEvent < resultIndex &&
          (nextChoice?.roundIndex !== current.roundIndex || next === state.currentChoice)
        ) {
          state.currentEventIndex = resultIndex;
          renderChoice();
          return;
        }
      }
      state.currentChoice = next;
      state.currentEventIndex = null;
      renderChoice();
    }

    function roundIndexForEvent(eventIndex) {
      const idx = state.rounds.findIndex(round => eventIndex >= round.start && eventIndex <= round.end);
      return Math.max(0, idx);
    }

    function setCurrentChoiceByEvent(eventIndex) {
      const roundIndex = roundIndexForEvent(eventIndex);
      const roundChoices = state.choices.filter(choice => choice.roundIndex === roundIndex);
      if (!roundChoices.length) return;
      let choice = roundChoices[0];
      for (const candidate of roundChoices) {
        if (candidate.eventIndex <= eventIndex) choice = candidate;
        else break;
      }
      state.currentChoice = choice.index;
    }

    function goEvent(delta) {
      const choice = state.choices[state.currentChoice];
      const current = state.currentEventIndex ?? choice?.eventIndex ?? 0;
      const next = Math.max(0, Math.min(state.events.length - 1, current + delta));
      state.currentEventIndex = next;
      setCurrentChoiceByEvent(next);
      renderChoice();
    }

    function goRound(delta) {
      const current = state.choices[state.currentChoice];
      const targetRound = Math.max(0, Math.min(state.rounds.length - 1, current.roundIndex + delta));
      const next = state.choices.find(choice => choice.roundIndex === targetRound);
      if (next) {
        state.currentChoice = next.index;
        state.currentEventIndex = state.rounds[targetRound]?.start ?? next.eventIndex;
        renderChoice();
      }
    }

    function goDiff(delta) {
      const diffs = state.choices.filter(choice => choice.diff);
      if (!diffs.length) return;
      const current = state.choices[state.currentChoice];
      let pos = diffs.findIndex(choice => choice.index >= current.index);
      if (pos < 0) pos = 0;
      pos = Math.max(0, Math.min(diffs.length - 1, pos + delta));
      state.currentChoice = diffs[pos].index;
      state.currentEventIndex = null;
      renderChoice();
    }

    function currentRoundAiMatchStats() {
      const current = state.choices[state.currentChoice];
      if (!current) return null;
      const choices = state.choices.filter(choice =>
        choice.roundIndex === current.roundIndex &&
        choice.output?.type !== 'none' &&
        choice.actual
      );
      const matched = choices.filter(choice => sameAction(choice.output, choice.actual)).length;
      const total = choices.length;
      const rate = total ? matched / total : 0;
      return {
        roundIndex: current.roundIndex,
        roundName: roundName(state.rounds[current.roundIndex].info),
        matched,
        total,
        rate,
      };
    }

    function showCurrentRoundAiMatchRate() {
      const stats = currentRoundAiMatchStats();
      if (!stats || !stats.total) {
        alert('本局没有可直接比较的 AI 动作节点。');
        return;
      }
      const percent = (stats.rate * 100).toFixed(1);
      alert(`${stats.roundName} AI吻合率：${percent}%\n吻合 ${stats.matched} / ${stats.total}`);
    }

    function wholeGameAiMatchStats() {
      const choices = state.choices.filter(choice =>
        choice.output?.type !== 'none' &&
        choice.actual
      );
      const matched = choices.filter(choice => sameAction(choice.output, choice.actual)).length;
      const total = choices.length;
      const rate = total ? matched / total : 0;
      return { matched, total, rate };
    }

    function showWholeGameAiMatchRate() {
      const stats = wholeGameAiMatchStats();
      if (!stats.total) {
        alert('整场没有可直接比较的 AI 动作节点。');
        return;
      }
      const percent = (stats.rate * 100).toFixed(1);
      alert(`整场AI吻合率：${percent}%\n吻合 ${stats.matched} / ${stats.total}`);
    }

    let settlementDrag = null;

    function startSettlementDrag(event) {
      const box = event.target.closest('[data-draggable-settlement]');
      if (!box) return;
      event.preventDefault();
      const table = $('table');
      const boxRect = box.getBoundingClientRect();
      const tableRect = table.getBoundingClientRect();
      box.style.left = `${boxRect.left - tableRect.left}px`;
      box.style.top = `${boxRect.top - tableRect.top}px`;
      box.style.right = 'auto';
      settlementDrag = {
        box,
        table,
        offsetX: event.clientX - boxRect.left,
        offsetY: event.clientY - boxRect.top,
      };
      box.setPointerCapture?.(event.pointerId);
    }

    function moveSettlementDrag(event) {
      if (!settlementDrag) return;
      const { box, table, offsetX, offsetY } = settlementDrag;
      const tableRect = table.getBoundingClientRect();
      const maxLeft = table.clientWidth - box.offsetWidth;
      const maxTop = table.clientHeight - box.offsetHeight;
      const left = Math.max(0, Math.min(maxLeft, event.clientX - tableRect.left - offsetX));
      const top = Math.max(0, Math.min(maxTop, event.clientY - tableRect.top - offsetY));
      box.style.left = `${left}px`;
      box.style.top = `${top}px`;
    }

    function endSettlementDrag() {
      settlementDrag = null;
    }

    document.addEventListener('click', event => {
      const roundBtn = event.target.closest('[data-round]');
      if (roundBtn) {
        const round = Number(roundBtn.dataset.round);
        const next = state.choices.find(choice => choice.roundIndex === round);
        if (next) {
          state.currentChoice = next.index;
          state.currentEventIndex = state.rounds[round]?.start ?? next.eventIndex;
          renderChoice();
        }
      }
      const choiceBtn = event.target.closest('[data-choice]');
      if (choiceBtn) {
        state.currentChoice = Number(choiceBtn.dataset.choice);
        state.currentEventIndex = null;
        renderChoice();
      }
    });
    document.addEventListener('pointerdown', startSettlementDrag);
    document.addEventListener('pointermove', moveSettlementDrag);
    document.addEventListener('pointerup', endSettlementDrag);
    document.addEventListener('pointercancel', endSettlementDrag);

    $('prevChoice').onclick = () => goChoice(-1);
    $('nextChoice').onclick = () => goChoice(1);
    $('prevEvent').onclick = () => goEvent(-1);
    $('nextEvent').onclick = () => goEvent(1);
    $('prevRound').onclick = () => goRound(-1);
    $('nextRound').onclick = () => goRound(1);
    $('prevDiff').onclick = () => goDiff(-1);
    $('nextDiff').onclick = () => goDiff(1);
    $('aiMatchRate').onclick = showCurrentRoundAiMatchRate;
    $('wholeMatchRate').onclick = showWholeGameAiMatchRate;
    $('roundSelect').onchange = event => {
      const round = Number(event.target.value);
      const next = state.choices.find(choice => choice.roundIndex === round);
      if (next) {
        state.currentChoice = next.index;
        state.currentEventIndex = state.rounds[round]?.start ?? next.eventIndex;
        renderChoice();
      }
    };

    async function boot(tileSize = null) {
      if (location.protocol !== 'http:' && location.protocol !== 'https:') {
        location.href = 'http://127.0.0.1:8000/mortal-output-viewer.html';
        return;
      }
      if (tileSize !== null) setMahjongTileSize(tileSize);
      try {
        const [logRes, outRes, tenhouRes, configRes] = await Promise.all([
          fetch('viewer-data/log.json', { cache: 'no-store' }),
          fetch('viewer-data/mortal-output-p2-mapped.jsonl', { cache: 'no-store' }),
          fetch('viewer-data/majsoul-tenhou-current.json', { cache: 'no-store' }).catch(() => null),
          fetch('viewer-data/mortal-viewer-config.json', { cache: 'no-store' }).catch(() => null),
        ]);
        if (configRes?.ok) {
          const config = await configRes.json();
          if (Number.isInteger(config.player_id) && config.player_id >= 0 && config.player_id <= 3) {
            PLAYER_ID = config.player_id;
          }
        }
        state.events = parseJsonl(await logRes.text());
        state.outputs = parseJsonl(await outRes.text());
        state.tenhouRounds = tenhouRes?.ok ? parseTenhouRounds(await tenhouRes.json()) : [];
        state.names = state.events.find(event => event.type === 'start_game')?.names || ['0', '1', '2', '3'];
        state.rounds = buildRounds(state.events);
        state.choices = buildChoices(state.outputs);
        state.currentChoice = 0;
        state.currentEventIndex = state.rounds[state.choices[0]?.roundIndex || 0]?.start ?? state.choices[0]?.eventIndex ?? 0;
        renderAll();
      } catch (error) {
        $('status').innerHTML = `<span class="error">${escapeHtml(error.message)}</span>`;
        $('table').innerHTML = `
          <div class="center-box" style="width: min(520px, 90%); min-height: 150px;">
            <div class="center-round">加载失败</div>
            <div class="center-extra">
              请用本地服务器地址打开页面：<br>
              http://127.0.0.1:8000/mortal-output-viewer.html<br><br>
              错误：${escapeHtml(error.message)}
            </div>
          </div>
        `;
        $('choiceDetail').innerHTML = `<div class="compare-row"><div class="compare-value error">数据没有加载成功</div></div>`;
      }
    }

    boot(50);
  </script>
</body>
</html>
